server:
  endpoint: "http://localhost:8089"
  insecure: true

disk_buffer:
  path: "/var/lib/xemarify-agent/spool/events.log"
  max_bytes: 524288000

agent:
  id: "ID AGENT"
  key: "KEY AGENT from agents table"
  agent_key: ""

syslog:
  listen: ":5514"

filelog:
  enabled: true
  poll_interval: 5s
  paths:
    - /var/log/nginx/access.log
    - /var/log/nginx/error.log
    - /var/log/apache2/access.log
    - /var/log/apache2/error.log

inventory:
  enabled: true
  interval: 5m
