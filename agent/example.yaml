server:
  endpoint: "http://localhost:8089"
  insecure: true

enrollment_token: ""

disk_buffer:
  path: "/var/lib/xemarify-agent/spool/events.log"
  max_bytes: 524288000

agent:
  id: ""
  agent_secret: ""
  name: ""
  hostname: ""
  ip_address: ""

syslog:
  listen: ":5514"

filelog:
  enabled: true
  poll_interval: 5s
  paths:
    - /var/log/nginx/access.log
    - /var/log/nginx/error.log
    - /var/log/apache2/access.log
    - /var/log/apache2/error.log

inventory:
  enabled: true
  interval: 5m

log:
  path: "/var/log/xemarify-agent/agent.log"
  max_size_mb: 100
  max_backups: 5
