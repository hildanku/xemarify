services:
  db:
    image: postgres:18.2-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: xemarify_manager
      POSTGRES_PASSWORD: xemarify_manager
      POSTGRES_DB: xemarify_manager
    ports:
      - 5445:5432
    volumes:
      - db_data:/var/lib/postgresql

volumes:
  db_data:
    driver: local
